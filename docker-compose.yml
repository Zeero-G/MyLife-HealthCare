version: "3.9"

# ──────────────────────────────────────────────────────────────────────────────
# MYLIFE – Docker Compose
# Runs all 5 microservices + NGINX API Gateway
# Usage: docker-compose up --build -d
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── NGINX API Gateway ──────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: mylife-gateway
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - medical-records-service
      - family-profile-service
      - ai-processing-service
      - notification-service
    networks:
      - mylife-network
    restart: unless-stopped

  # ── 1. Auth Service (8001) ─────────────────────────────────────────────────
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: mylife-auth
    ports:
      - "8001:8001"
    env_file:
      - ./services/auth-service/.env
    environment:
      - NOTIFICATION_SERVICE_URL=http://notification-service:8005
    networks:
      - mylife-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── 2. Medical Records Service (8002) ──────────────────────────────────────
  medical-records-service:
    build:
      context: ./services/medical-records-service
      dockerfile: Dockerfile
    container_name: mylife-medical
    ports:
      - "8002:8002"
    env_file:
      - ./services/medical-records-service/.env
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8001
      - NOTIFICATION_SERVICE_URL=http://notification-service:8005
      - AI_SERVICE_URL=http://ai-processing-service:8004
    networks:
      - mylife-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── 3. Family & Profile Service (8003) ────────────────────────────────────
  family-profile-service:
    build:
      context: ./services/family-profile-service
      dockerfile: Dockerfile
    container_name: mylife-family
    ports:
      - "8003:8003"
    env_file:
      - ./services/family-profile-service/.env
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8001
    networks:
      - mylife-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── 4. AI Processing Service (8004) ───────────────────────────────────────
  ai-processing-service:
    build:
      context: ./services/ai-processing-service
      dockerfile: Dockerfile
    container_name: mylife-ai
    ports:
      - "8004:8004"
    env_file:
      - ./services/ai-processing-service/.env
    environment:
      - NOTIFICATION_SERVICE_URL=http://notification-service:8005
    networks:
      - mylife-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── 5. Notification Service (8005) ────────────────────────────────────────
  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: mylife-notification
    ports:
      - "8005:8005"
    env_file:
      - ./services/notification-service/.env
    networks:
      - mylife-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# ── Shared network ────────────────────────────────────────────────────────────
networks:
  mylife-network:
    driver: bridge
