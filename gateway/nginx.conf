events {
    worker_connections 1024;
}

http {
    # ── Upstream services ─────────────────────────────────────
    upstream auth_service        { server auth-service:8001; }
    upstream medical_service     { server medical-records-service:8002; }
    upstream family_service      { server family-profile-service:8003; }
    upstream ai_service          { server ai-processing-service:8004; }
    upstream notification_service { server notification-service:8005; }

    # ── Rate limiting ─────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    server {
        listen 80;
        server_name localhost;

        # Hide CORS headers from upstream FastAPI services to prevent duplicates
        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Credentials';
        proxy_hide_header 'Access-Control-Allow-Methods';
        proxy_hide_header 'Access-Control-Allow-Headers';

        # CORS header helper (NGINX handles CORS completely)
        add_header 'Access-Control-Allow-Origin'  '$http_origin' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;

        # Preflight
        if ($request_method = OPTIONS) {
            return 204;
        }

        # Health check aggregator
        location = /health {
            return 200 '{"gateway":"ok"}';
            add_header Content-Type application/json;
        }

        # ── Route /auth → Auth Service (8001) ────────────────
        location /auth {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://auth_service;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ── Route /records → Medical Records Service (8002) ──
        location /records {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://medical_service;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            client_max_body_size 20M;
        }

        location /emergency {
            proxy_pass http://medical_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Route /appointments → Medical Records Service (8002) ──
        location /appointments {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://medical_service;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ── Route /family → Family & Profile Service (8003) ──
        location /family {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://family_service;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
        }

        location /health/cycle     { proxy_pass http://family_service; }
        location /health/pregnancy { proxy_pass http://family_service; }

        # ── Route /ai → AI Processing Service (8004) ─────────
        location /ai {
            limit_req zone=api burst=5 nodelay;
            proxy_pass http://ai_service;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_read_timeout 120s;    # AI extraction can take time
        }

        # ── Route /notify → Notification Service (8005) ───────
        location /notify {
            # Internal only – consider IP whitelist in production
            proxy_pass http://notification_service;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
        }
    }
}
