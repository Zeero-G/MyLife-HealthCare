version: "3.9"

# ──────────────────────────────────────────────────────────────────────────────
# MYLIFE – Local Development Override
# Uses plain HTTP (no SSL) so you can run the full stack locally without certs
# Usage: docker-compose -f docker-compose.local.yml up --build -d
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── NGINX API Gateway (LOCAL: HTTP only, no SSL) ───────────────────────────
  nginx:
    image: nginx:alpine
    container_name: mylife-gateway
    ports:
      - "80:80"           # HTTP only — no 443
    volumes:
      - ./gateway/nginx.local.conf:/etc/nginx/nginx.conf:ro   # No certs needed
    depends_on:
      - auth-service
      - medical-records-service
      - family-profile-service
      - ai-processing-service
      - notification-service
    networks:
      - mylife-network
    restart: unless-stopped

  # ── 1. Auth Service (8001) ─────────────────────────────────────────────────
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: mylife-auth
    ports:
      - "8001:8001"
    env_file:
      - ./services/auth-service/.env
    environment:
      - NOTIFICATION_SERVICE_URL=http://notification-service:8005
    networks:
      - mylife-network
    restart: unless-stopped

  # ── 2. Medical Records Service (8002) ──────────────────────────────────────
  medical-records-service:
    build:
      context: ./services/medical-records-service
      dockerfile: Dockerfile
    container_name: mylife-medical
    ports:
      - "8002:8002"
    env_file:
      - ./services/medical-records-service/.env
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8001
      - NOTIFICATION_SERVICE_URL=http://notification-service:8005
      - AI_SERVICE_URL=http://ai-processing-service:8004
    networks:
      - mylife-network
    restart: unless-stopped

  # ── 3. Family & Profile Service (8003) ────────────────────────────────────
  family-profile-service:
    build:
      context: ./services/family-profile-service
      dockerfile: Dockerfile
    container_name: mylife-family
    ports:
      - "8003:8003"
    env_file:
      - ./services/family-profile-service/.env
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8001
    networks:
      - mylife-network
    restart: unless-stopped

  # ── 4. AI Processing Service (8004) ───────────────────────────────────────
  ai-processing-service:
    build:
      context: ./services/ai-processing-service
      dockerfile: Dockerfile
    container_name: mylife-ai
    ports:
      - "8004:8004"
    env_file:
      - ./services/ai-processing-service/.env
    environment:
      - NOTIFICATION_SERVICE_URL=http://notification-service:8005
    networks:
      - mylife-network
    restart: unless-stopped

  # ── 5. Notification Service (8005) ────────────────────────────────────────
  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: mylife-notification
    ports:
      - "8005:8005"
    env_file:
      - ./services/notification-service/.env
    networks:
      - mylife-network
    restart: unless-stopped

# ── Shared network ────────────────────────────────────────────────────────────
networks:
  mylife-network:
    driver: bridge
